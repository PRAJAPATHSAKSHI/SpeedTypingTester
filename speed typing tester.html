<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speed Typing Tester</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#4f46e5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:700px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.paragraph{
    background:#f4f4f4;
    padding:15px;
    border-radius:10px;
    line-height:1.8;
    margin-bottom:15px;
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
    font-size:16px;
    border:2px solid #ddd;
    border-radius:10px;
    resize:none;
}

.stats{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
    font-weight:bold;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    background:#4f46e5;
    color:white;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#3730a3;
}
</style>
</head>
<body>

<div class="container">
    <h1>Speed Typing Tester</h1>

    <div class="paragraph" id="paragraph"></div>

    <textarea id="inputText"
    placeholder="Start typing here..."></textarea>

    <div class="stats">
        <p>Time: <span id="time">60</span>s</p>
        <p>WPM: <span id="wpm">0</span></p>
        <p>Accuracy: <span id="accuracy">0</span>%</p>
    </div>

    <button onclick="restartTest()">Restart Test</button>
</div>

<script>

const paragraphs = [
"The quick brown fox jumps over the lazy dog.",
"Technology is changing the world faster than ever before.",
"Practice makes a person perfect in every field of life.",
"Typing speed can be improved through regular practice.",
"Web development combines HTML CSS and JavaScript."
];

let timer = 60;
let timeStarted = false;
let interval;

const paragraph = document.getElementById("paragraph");
const inputText = document.getElementById("inputText");
const time = document.getElementById("time");
const wpm = document.getElementById("wpm");
const accuracy = document.getElementById("accuracy");

function loadParagraph(){
    let random =
    paragraphs[Math.floor(Math.random()*paragraphs.length)];

    paragraph.textContent = random;
}

loadParagraph();

inputText.addEventListener("input",()=>{

    if(!timeStarted){
        startTimer();
        timeStarted = true;
    }

    calculateResults();
});

function startTimer(){

    interval = setInterval(()=>{

        timer--;
        time.textContent = timer;

        if(timer===0){
            clearInterval(interval);
            inputText.disabled = true;
        }

    },1000);
}

function calculateResults(){

    let original = paragraph.textContent;
    let typed = inputText.value;

    let correctChars = 0;

    for(let i=0;i<typed.length;i++){
        if(typed[i]===original[i]){
            correctChars++;
        }
    }

    let accuracyValue =
    typed.length>0 ?
    ((correctChars/typed.length)*100).toFixed(2)
    : 0;

    accuracy.textContent = accuracyValue;

    let words = typed.trim().split(/\s+/).length;

    let elapsedMinutes =
    (60-timer)/60;

    let wpmValue =
    elapsedMinutes>0 ?
    Math.round(words/elapsedMinutes)
    : 0;

    wpm.textContent = wpmValue;
}

function restartTest(){

    clearInterval(interval);

    timer = 60;
    time.textContent = timer;

    wpm.textContent = 0;
    accuracy.textContent = 0;

    inputText.value = "";
    inputText.disabled = false;

    timeStarted = false;

    loadParagraph();
}

</script>

</body>
</html>
