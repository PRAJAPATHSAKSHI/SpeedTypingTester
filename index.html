<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Speed Typing Tester</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
}

.container{
width:90%;
max-width:900px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:30px;
border-radius:20px;
box-shadow:0 8px 32px rgba(0,0,0,.4);
}

h1{
text-align:center;
margin-bottom:20px;
}

.stats{
display:flex;
justify-content:space-around;
margin-bottom:20px;
flex-wrap:wrap;
}

.card{
background:rgba(255,255,255,.1);
padding:15px;
border-radius:12px;
min-width:150px;
text-align:center;
margin:5px;
}

.text-display{
background:#1f2937;
padding:20px;
border-radius:12px;
line-height:1.8;
font-size:20px;
margin-bottom:20px;
}

.correct{
color:#22c55e;
}

.incorrect{
color:#ef4444;
text-decoration:underline;
}

textarea{
width:100%;
height:150px;
padding:15px;
font-size:18px;
border:none;
border-radius:12px;
outline:none;
resize:none;
}

.progress{
width:100%;
height:12px;
background:#444;
border-radius:20px;
margin-top:20px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#00ff95;
transition:.3s;
}

button{
margin-top:20px;
width:100%;
padding:15px;
font-size:18px;
background:#00ff95;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

button:hover{
transform:scale(1.02);
}

</style>
</head>
<body>

<div class="container">

<h1>⚡ Speed Typing Tester</h1>

<div class="stats">

<div class="card">
<h3>⏳ Time</h3>
<p id="time">60</p>
</div>

<div class="card">
<h3>🚀 WPM</h3>
<p id="wpm">0</p>
</div>

<div class="card">
<h3>🎯 Accuracy</h3>
<p id="accuracy">100%</p>
</div>

<div class="card">
<h3>⌨ Characters</h3>
<p id="chars">0</p>
</div>

</div>

<div id="textDisplay" class="text-display"></div>

<textarea
id="inputArea"
placeholder="Start typing here...">
</textarea>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<button onclick="restartTest()">
🔄 Restart Test
</button>

</div>

<script>

const sampleText =
"The quick brown fox jumps over the lazy dog. Practice typing quickly and accurately to improve your typing speed and productivity.";

let timer = 60;
let started = false;
let interval;

const display =
document.getElementById("textDisplay");

const input =
document.getElementById("inputArea");

display.innerHTML =
sampleText.split("")
.map(char => `<span>${char}</span>`)
.join("");

input.addEventListener("input", () => {

if(!started){
startTimer();
started=true;
}

let typed = input.value;
let chars =
display.querySelectorAll("span");

let correct = 0;

chars.forEach((char,index)=>{

let typedChar = typed[index];

if(typedChar == null){

char.classList.remove(
"correct","incorrect");

}
else if(typedChar===char.innerText){

char.classList.add("correct");
char.classList.remove("incorrect");
correct++;

}
else{

char.classList.add("incorrect");
char.classList.remove("correct");

}

});

let accuracy =
typed.length===0
?100
:Math.round(
(correct/typed.length)*100);

document.getElementById(
"accuracy").innerText =
accuracy + "%";

document.getElementById(
"chars").innerText =
typed.length;

let words =
typed.trim().split(/\s+/).length;

let minutes =
(60-timer)/60;

let wpm =
minutes>0
?Math.round(words/minutes)
:0;

document.getElementById(
"wpm").innerText = wpm;

let progress =
(typed.length/sampleText.length)
*100;

document.getElementById(
"progressBar").style.width =
progress+"%";

});

function startTimer(){

interval = setInterval(()=>{

timer--;

document.getElementById(
"time").innerText = timer;

if(timer<=0){

clearInterval(interval);

input.disabled=true;

alert(
"Time Up!\nYour WPM: "
+
document.getElementById(
"wpm").innerText
);

}

},1000);

}

function restartTest(){

clearInterval(interval);

timer=60;
started=false;

document.getElementById(
"time").innerText=60;

document.getElementById(
"wpm").innerText=0;

document.getElementById(
"accuracy").innerText="100%";

document.getElementById(
"chars").innerText=0;

input.value="";
input.disabled=false;

document.getElementById(
"progressBar").style.width="0%";

display.innerHTML =
sampleText.split("")
.map(char=>`<span>${char}</span>`)
.join("");

}

</script>

</body>
</html>
